MINIMALISTA="Minimalista"
TPL_MINIMALISTA_XML_DESCRIPTION="Minimalista is a simple and clean Joomla template, built on the Bootstrap 5 framework and fully responsive. Highly customizable, it is the ideal choice for creating modern and elegant websites quickly."
TPL_MINIMALISTA_CONTAINER_FLUID="Full Width Site (Fluid)"
TPL_MINIMALISTA_CONTAINER_FLUID_DESC="Defines whether the ENTIRE site (header, body, and footer) will occupy 100% of the screen width. If disabled, the site will be contained and centered."
TPL_MINIMALISTA_COMPONENT_CONTAINER_FLUID="Component Area Width"
TPL_MINIMALISTA_COMPONENT_CONTAINER_FLUID_DESC="Overrides the global width only for the main content area. Useful to have the site contained but the body free, or vice versa. (Tip: Use the page class suffixes 'fluid-page', 'fluid-component' or 'container-component' in Menu Items for individual page control)."
