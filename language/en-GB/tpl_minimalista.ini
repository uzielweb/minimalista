TPL_MINIMALISTA_CUSTOM_CSS_TO_HEAD="Native Custom CSS (WebAssetManager)"
TPL_MINIMALISTA_CUSTOM_CSS_TO_HEAD_DESC="Injects inline CSS via Joomla API alongside the site's main styles (before &lt;/head&gt;). Do not use the &lt;style&gt; tag."
TPL_MINIMALISTA_CUSTOM_SCRIPT_TO_HEAD="Native Custom JavaScript (WebAssetManager)"
TPL_MINIMALISTA_CUSTOM_SCRIPT_TO_HEAD_DESC="Injects JavaScript via Joomla API alongside the site's general scripts (before &lt;/head&gt;). Do not use the &lt;script&gt; tag."
TPL_MINIMALISTA_CUSTOM_SCRIPT_TO_STARTHEAD="High Priority Global Scripts (Right after &lt;head&gt;)"
TPL_MINIMALISTA_CUSTOM_SCRIPT_TO_STARTHEAD_DESC="Prints code immediately after the &lt;head&gt; tag. Mandatory for Google Tag Manager, Facebook Pixel or anti-flicker scripts."
TPL_MINIMALISTA_CUSTOM_SCRIPT_TO_STARTBODY="Scripts at Body Start (Right after &lt;body&gt;)"
TPL_MINIMALISTA_CUSTOM_SCRIPT_TO_STARTBODY_DESC="Injected immediately after the &lt;body&gt; opening tag. Mostly used for the second part of GTM (&lt;noscript&gt; tag)."
TPL_MINIMALISTA_CUSTOM_SCRIPT_TO_ENDBODY="Scripts at Page End (Before &lt;/body&gt;)"
TPL_MINIMALISTA_CUSTOM_SCRIPT_TO_ENDBODY_DESC="Injected at the end of the document. Ideal for tracking codes, pixels or visual widgets that should not delay initial page load."
TPL_MINIMALISTA_SMART_HEADER="Smart Header (Auto-hide)"
TPL_MINIMALISTA_SMART_HEADER_DESC="If Yes, the header will automatically hide when scrolling down, and reappear when scrolling up."
TPL_MINIMALISTA_READING_PROGRESS_BAR="Reading Progress Bar"
TPL_MINIMALISTA_READING_PROGRESS_BAR_DESC="If Yes, a horizontal progress bar will appear at the top of the screen when reading an Article."
TPL_MINIMALISTA_GOOGLE_FONTS_URL="Google Fonts URL"
TPL_MINIMALISTA_GOOGLE_FONTS_URL_DESC="Enter the Google Fonts URL (e.g., https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;display=swap). The template will automatically preload it."
TPL_MINIMALISTA_CUSTOM_HEAD_CODE="Custom Head Tags (<meta>, <link>)"
TPL_MINIMALISTA_CUSTOM_HEAD_CODE_DESC="Injects tags via $doc->addCustomTag(). Ideal for verification meta tags (Search Console), pre-load links, or other &lt;link&gt; and &lt;meta&gt; tags."
